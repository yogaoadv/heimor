name: Scrape Product -> Sheets

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Product URL (e.g. https://tradestarexports.com/product/some-product/)"
        required: true
        type: string
      output_dir:
        description: "Output folder (optional, default: .)"
        required: false
        default: "."
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account key
        run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Scrape + push to Sheet
        run: python runner.py --url "${{ inputs.url }}" --output "${{ inputs.output_dir }}"
